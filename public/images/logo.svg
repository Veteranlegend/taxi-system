<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Background -->
  <rect width="500" height="500" rx="40" fill="#0f172a"/>

  <!-- Taxi icon -->
  <g transform="translate(250, 165)">
    <!-- Car body -->
    <rect x="-90" y="20" width="180" height="70" rx="12" fill="#25D366"/>
    <!-- Car roof -->
    <rect x="-55" y="-10" width="110" height="38" rx="10" fill="#25D366"/>
    <!-- Windows -->
    <rect x="-48" y="-4" width="44" height="28" rx="5" fill="#0f172a" opacity="0.6"/>
    <rect x="4" y="-4" width="44" height="28" rx="5" fill="#0f172a" opacity="0.6"/>
    <!-- Wheels -->
    <circle cx="-55" cy="92" r="18" fill="#1e293b" stroke="#94a3b8" stroke-width="4"/>
    <circle cx="55" cy="92" r="18" fill="#1e293b" stroke="#94a3b8" stroke-width="4"/>
    <!-- Headlights -->
    <rect x="82" y="35" width="16" height="10" rx="3" fill="#fef08a"/>
    <rect x="-98" y="35" width="16" height="10" rx="3" fill="#fef08a"/>
  </g>

  <!-- Text: Direct Taxi -->
  <text x="250" y="310" font-family="Arial, sans-serif" font-size="62" font-weight="900" fill="white" text-anchor="middle" letter-spacing="2">DIRECT TAXI</text>

  <!-- Divider -->
  <rect x="120" y="325" width="260" height="2" rx="1" fill="#25D366"/>

  <!-- Text: Lebanon -->
  <text x="250" y="375" font-family="Arial, sans-serif" font-size="38" font-weight="600" fill="#25D366" text-anchor="middle" letter-spacing="6">LEBANON</text>
</svg>
